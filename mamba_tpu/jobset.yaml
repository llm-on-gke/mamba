apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: mamba3-fsdp-training
  namespace: default
spec:
  failurePolicy:
    maxRestarts: 0
  replicatedJobs:
  - name: slice
    replicas: 1
    template:
      spec:
        parallelism: 2  # 4 nodes in the slice
        completions: 2
        backoffLimit: 0
        template:
          metadata:
            annotations:
              #iam.gke.io/gcp-service-account: "${GCP_SERVICE_ACCOUNT}"
              gke-gcsfuse/volumes: "true"
          spec:
            restartPolicy: Never
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            nodeSelector:
              cloud.google.com/gke-tpu-accelerator: tpu7x
              cloud.google.com/gke-tpu-topology: 2x2x2
            tolerations:
            - key: "google.com/tpu"
              operator: "Exists"
              effect: "NoSchedule"
            serviceAccountName: gcs-sa
            volumes:
            - name: dshm
              emptyDir:
                medium: Memory
            - name: gcs-fuse-writing
              csi:
                driver: gcsfuse.csi.storage.gke.io
                volumeAttributes:
                  bucketName: rick-tpu7x
                  mountOptions: "only-dir=torch-tpu,implicit-dirs"
                  fileCacheCapacity: "-1Mi"
                  fileCacheForRangeRead: "true"
                  metadataCacheTTLSeconds: "-1"
                  metadataNegativeCacheTTLSeconds: "0"
                  metadataStatCacheCapacity: "-1Mi"
                  metadataTypeCacheCapacity: "-1Mi"
            containers:
            - name: torch-tpu-container
              image: us-east1-docker.pkg.dev/cloud-tpu-multipod-dev/gke-llm/mamba3-tpu:latest
              securityContext:
                privileged: true
              ports:
              - containerPort: 8471
              - containerPort: 29500
              resources:
                limits:
                  google.com/tpu: 4  # 4 chips per node
              env:
              - name: PYTHONPATH
                value: "/workspace/mamba_tpu"
              - name: MASTER_ADDR
                value: "mamba3-fsdp-training-slice-0-0.mamba3-fsdp-training"
              - name: MASTER_PORT
                value: "29500"
              - name: ALLOW_MULTIPLE_LIBTPU_LOAD
                value: "1"
              volumeMounts:
              - name: dshm
                mountPath: /dev/shm
              - name: gcs-fuse-writing
                mountPath: /gcs-fuse
              command:
              - bash
              - -c
              - |
               
                # Set TORCH_TPU_TOPOLOGY
                export TORCH_TPU_TOPOLOGY="2,2,2,2"
                
                export WORLD_SIZE=16

                echo "Running multihost_wrapper to detect topology..."
                eval $(python3 -m torch_tpu._internal.distributed.launchers.multihost_wrapper)
                export TORCH_TPU_TOPOLOGY TORCH_TPU_SLICEBUILDER_ADDRESSES
                export TORCH_TPU_XPROF_SESSION_ID
                export NNODES NODE_RANK MASTER_ADDR MASTER_PORT

                echo "Configuration detected:"
                echo "  NNODES: $NNODES"
                echo "  NODE_RANK: $NODE_RANK"
                echo "  MASTER_ADDR: $MASTER_ADDR"
                echo "  MASTER_PORT: $MASTER_PORT"
                echo "  TOPOLOGY: $TORCH_TPU_TOPOLOGY"
                #sleep infinity

                cd /workspace/mamba_tpu
                
                python3 -m torch.distributed.run \
                  --nproc_per_node=8 \
                  --nnodes=2 \
                  --node_rank=$NODE_RANK \
                  --master_addr=$MASTER_ADDR \
                  --master_port=$MASTER_PORT \
                  ./model_parallel_playground.py --model mamba2 --config fsdp
